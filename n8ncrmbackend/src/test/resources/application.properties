# Test profile: use embedded DB so tests don't require Docker.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Provide defaults for properties normally defined in src/main/resources/application.properties.
n8n.webhook.crm.url=http://localhost:5678/webhook-test/process-crm
n8n.webhook.chat.url=http://localhost:5678/webhook-test/chat
app.cors.allowed-origins=http://localhost:3000

# Keep logging quiet for tests.
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
