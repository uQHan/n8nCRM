spring.application.name=n8ncrmbackend

# --- Database (Supabase Postgres) ---
# Provide these via environment variables.
spring.datasource.url=${SUPABASE_DB_JDBC_URL:}
spring.datasource.username=${SUPABASE_DB_USER:}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}

# Keep schema controlled by Flyway, not Hibernate.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- n8n ---
n8n.webhook.crm.url=${N8N_CRM_WEBHOOK_URL:http://localhost:5678/webhook/process-crm}
n8n.webhook.chat.url=${N8N_CHAT_WEBHOOK_URL:http://localhost:5678/webhook/chat}
n8n.webhook.email.url=${N8N_EMAIL_WEBHOOK_URL:http://localhost:5678/webhook/send-email}

# --- CORS (Next.js) ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Outbound email (SMTP) ---
# Provide these via environment variables for production.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

# Optional override for the From: address
app.mail.from=${APP_MAIL_FROM:}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
