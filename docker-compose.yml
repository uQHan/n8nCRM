volumes:
  db_storage:
  n8n_storage:

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-n8ncrm}
      POSTGRES_NON_ROOT_USER: ${POSTGRES_NON_ROOT_USER:-n8n}
      POSTGRES_NON_ROOT_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD:-n8n}
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8ncrm}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD:-n8n}
      - NODE_FUNCTION_ALLOW_EXTERNAL=uuid
    ports:
      - 5678:5678
    links:
      - postgres
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  spring-backend:
    build:
      context: ./n8ncrmbackend
    restart: always
    environment:
      # Database — matches ${SUPABASE_DB_*} placeholders in application.properties
      - SUPABASE_DB_JDBC_URL=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
      - SUPABASE_DB_USER=postgres.beykniltpmbpbytgzezw
      - SUPABASE_DB_PASSWORD=414BOW9fXVgfWmXf
      # n8n webhooks (internal service-to-service)
      - N8N_CRM_WEBHOOK_URL=http://n8n:5678/webhook/process-crm
      - N8N_CHAT_WEBHOOK_URL=http://n8n:5678/webhook/chat
      - N8N_EMAIL_WEBHOOK_URL=http://n8n:5678/webhook/send-email
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started

  nextjs:
    build:
      context: ./nextjs-app
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_SPRING_API_URL=http://localhost:8080
    ports:
      - 3000:3000
    depends_on:
      - spring-backend
